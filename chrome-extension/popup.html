<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      /* ── font ───────────────────────────────────────────────────────── */
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('fonts/JetBrainsMono[wght].woff2') format('woff2-variations');
        font-weight: 100 800;
        font-display: swap;
      }

      /* ── design tokens ──────────────────────────────────────────────── */
      :root {
        --font-ui:   ui-sans-serif, -apple-system, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

        --radius-sm: 4px;
        --radius-md: 6px;
        --ease: cubic-bezier(0.2, 0, 0, 1);
        --dur: 180ms;

        --accent:      oklch(0.64 0.21 26);
        --accent-soft: oklch(0.64 0.21 26 / 0.14);
        --accent-halo: oklch(0.64 0.21 26 / 0.28);

        --green:      oklch(0.68 0.17 148);
        --green-glow: oklch(0.68 0.17 148 / 0.6);
        --red:        oklch(0.60 0.20 25);
        --red-glow:   oklch(0.60 0.20 25 / 0.5);

        /* dark theme */
        --bg:          oklch(0.17 0.005 60);
        --bg-sunk:     oklch(0.14 0.005 60);
        --surface:     oklch(0.21 0.005 60);
        --surface-hi:  oklch(0.24 0.005 60);
        --border:      oklch(0.29 0.005 60);
        --border-soft: oklch(0.23 0.005 60);
        --text:        oklch(0.96 0 0);
        --text-2:      oklch(0.78 0.004 60);
        --text-3:      oklch(0.56 0.006 60);
        --text-4:      oklch(0.40 0.006 60);
      }

      /* ── reset ──────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        width: 320px;
        font-family: var(--font-ui);
        font-size: 12.5px;
        line-height: 1.45;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

      /* ── titlebar ───────────────────────────────────────────────────── */
      .titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px 9px;
        border-bottom: 1px solid var(--border-soft);
      }
      .brand-mark {
        width: 15px; height: 15px; flex-shrink: 0;
        border-radius: 4px;
        background: linear-gradient(135deg, var(--accent) 0%, oklch(0.52 0.2 35) 100%);
        box-shadow: 0 0 8px var(--accent-halo);
      }
      .brand-title { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; flex: 1; }
      .brand-sep   { color: var(--text-4); font-size: 11px; }
      .brand-ver   {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-4);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ── status row ─────────────────────────────────────────────────── */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 7px 12px;
        background: var(--bg-sunk);
        border-bottom: 1px solid var(--border-soft);
      }
      .status-dot {
        width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
        background: var(--text-4);
        transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
      }
      .status-bar.connected    .status-dot { background: var(--green); box-shadow: 0 0 5px var(--green-glow); }
      .status-bar.disconnected .status-dot { background: var(--red);   box-shadow: 0 0 5px var(--red-glow); }

      .status-text {
        flex: 1;
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--text-3);
      }
      .status-bar.connected    .status-text { color: var(--green); }
      .status-bar.disconnected .status-text { color: oklch(0.72 0.16 25); }

      /* ── buttons ────────────────────────────────────────────────────── */
      .btn {
        font-size: 10.5px;
        font-weight: 500;
        padding: 3px 9px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        color: var(--text-2);
        background: var(--surface);
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
        cursor: pointer;
        white-space: nowrap;
      }
      .btn:hover   { background: var(--surface-hi); color: var(--text); }
      .btn.primary {
        background: var(--accent-soft);
        border-color: oklch(0.64 0.21 26 / 0.40);
        color: oklch(0.82 0.15 26);
      }
      .btn.primary:hover { background: oklch(0.64 0.21 26 / 0.22); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ── drawer tabs ────────────────────────────────────────────────── */
      .drawer-tabs {
        display: flex; align-items: center; gap: 6px;
        padding: 7px 10px;
        background: var(--bg-sunk);
        border-bottom: 1px solid var(--border-soft);
      }
      .tab-chip {
        flex: 1;
        height: 28px; padding: 0 10px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        color: var(--text-3);
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        font-size: 11.5px; font-weight: 500;
        white-space: nowrap;
        transition:
          background var(--dur) var(--ease),
          color var(--dur) var(--ease),
          border-color var(--dur) var(--ease);
      }
      .tab-chip svg { width: 13px; height: 13px; flex-shrink: 0; }
      .tab-chip:hover { background: var(--surface); color: var(--text); }
      .tab-chip.is-active {
        background: var(--accent-soft);
        border-color: oklch(0.64 0.21 26 / 0.45);
        color: oklch(0.86 0.12 26);
      }
      .tab-chip.is-active:hover { background: oklch(0.64 0.21 26 / 0.22); }
      .tab-chip .tab-badge {
        display: inline-block;
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 5px var(--accent-halo);
        opacity: 0;
        transition: opacity var(--dur) var(--ease);
      }
      .tab-chip.has-indicator .tab-badge { opacity: 1; }

      /* ── drawer ─────────────────────────────────────────────────────── */
      .drawer {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows var(--dur) var(--ease);
      }
      .drawer.is-open { grid-template-rows: 1fr; }
      .drawer-inner {
        overflow: hidden;
        min-height: 0;
      }

      .panel {
        display: none;
        padding: 12px 12px 14px;
        animation: panelFade var(--dur) var(--ease);
      }
      .panel.is-active { display: block; }
      @keyframes panelFade {
        from { opacity: 0; transform: translateY(-3px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .panel-title {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-4);
        margin: 0 0 8px;
      }

      /* ── setup list ─────────────────────────────────────────────────── */
      .setup-list {
        margin: 0; padding: 0;
        list-style: none;
        counter-reset: setup;
        display: flex; flex-direction: column; gap: 6px;
      }
      .setup-list li {
        counter-increment: setup;
        position: relative;
        padding-left: 22px;
        font-size: 11.5px; color: var(--text-2); line-height: 1.5;
      }
      .setup-list li::before {
        content: counter(setup);
        position: absolute;
        left: 0; top: 1px;
        width: 15px; height: 15px;
        display: grid; place-items: center;
        font-family: var(--font-mono);
        font-size: 9.5px; font-weight: 600;
        color: oklch(0.82 0.15 26);
        background: var(--accent-soft);
        border: 1px solid oklch(0.64 0.21 26 / 0.35);
        border-radius: 4px;
      }
      .setup-list code {
        font-family: var(--font-mono); font-size: 10.5px;
        background: var(--bg-sunk); padding: 1px 5px; border-radius: 3px;
        color: var(--text-2);
      }

      /* ── settings row ───────────────────────────────────────────────── */
      .toggle-row {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 10px;
        background: var(--bg-sunk);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-md);
      }
      .toggle-row + .toggle-row { margin-top: 6px; }
      .toggle-info { flex: 1; min-width: 0; }
      .toggle-label { font-size: 12px; font-weight: 500; color: var(--text); }
      .toggle-sub {
        font-size: 10.5px; color: var(--text-3); margin-top: 2px;
      }
      .toggle-sub code {
        font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
      }

      /* ── toggle switch ──────────────────────────────────────────────── */
      .toggle-switch { position: relative; width: 30px; height: 17px; flex-shrink: 0; }
      .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
      .toggle-slider {
        position: absolute; inset: 0;
        background: var(--border); border-radius: 17px; cursor: pointer;
        transition: background var(--dur) var(--ease);
      }
      .toggle-slider::before {
        content: '';
        position: absolute;
        width: 11px; height: 11px; left: 3px; top: 3px;
        background: var(--text-4); border-radius: 50%;
        transition: transform var(--dur) var(--ease), background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
      }
      .toggle-switch input:checked + .toggle-slider { background: oklch(0.64 0.21 26 / 0.45); }
      .toggle-switch input:checked + .toggle-slider::before {
        background: var(--accent);
        transform: translateX(13px);
        box-shadow: 0 0 5px var(--accent-halo);
      }

      /* ── preamble ───────────────────────────────────────────────────── */
      .preamble-desc { font-size: 11px; color: var(--text-3); margin: 0 0 6px; }
      #preamble {
        width: 100%; height: 120px;
        font-family: var(--font-mono); font-size: 11px; line-height: 1.5;
        border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
        padding: 6px 8px; resize: vertical;
        color: var(--text-2); background: var(--bg-sunk);
        outline: none;
        transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
      }
      #preamble:focus {
        border-color: oklch(0.64 0.21 26 / 0.5);
        box-shadow: 0 0 0 2px var(--accent-soft);
      }
      #preamble::placeholder { color: var(--text-4); }
      .save-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
      #save-status {
        flex: 1; text-align: right;
        font-family: var(--font-mono); font-size: 10.5px; color: var(--green);
        opacity: 0; transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>

    <div class="titlebar">
      <div class="brand-mark"></div>
      <span class="brand-title">Live Injector</span>
      <span class="brand-sep">/</span>
      <span class="brand-ver">v2</span>
    </div>

    <div id="status" class="status-bar disconnected">
      <div class="status-dot"></div>
      <span id="status-text" class="status-text">Disconnected</span>
      <button id="reconnect"  class="btn primary">Reconnect</button>
      <button id="disconnect" class="btn" style="display:none">Disconnect</button>
    </div>

    <div class="drawer-tabs" role="tablist">
      <button class="tab-chip" data-tab="setup" role="tab" aria-controls="panel-setup" aria-selected="false" title="Setup">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8" cy="8" r="6.2"/>
          <path d="M8 5.4v3M8 10.6h.01"/>
        </svg>
        <span>Setup</span>
      </button>
      <button class="tab-chip" data-tab="settings" role="tab" aria-controls="panel-settings" aria-selected="false" title="Settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2.5 4.5h7M12 4.5h1.5"/>
          <circle cx="10.8" cy="4.5" r="1.3"/>
          <path d="M2.5 11.5h3M8 11.5h5.5"/>
          <circle cx="6.8" cy="11.5" r="1.3"/>
        </svg>
        <span>Settings</span>
        <span class="tab-badge" aria-hidden="true"></span>
      </button>
      <button class="tab-chip" data-tab="preamble" role="tab" aria-controls="panel-preamble" aria-selected="false" title="JS Preamble">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5.5 5 2.5 8l3 3M10.5 5l3 3-3 3M9 3.5 7 12.5"/>
        </svg>
        <span>Preamble</span>
        <span class="tab-badge" aria-hidden="true"></span>
      </button>
    </div>

    <div class="drawer" id="drawer">
      <div class="drawer-inner">

        <section class="panel" id="panel-setup" role="tabpanel" aria-labelledby="tab-setup">
          <h3 class="panel-title">Setup</h3>
          <ol class="setup-list">
            <li>Install &amp; start the <strong>VS Code extension</strong></li>
            <li>Save any <code>.js</code> or <code>.css</code> file in VS Code</li>
            <li>Code executes instantly in the active tab</li>
          </ol>
        </section>

        <section class="panel" id="panel-settings" role="tabpanel" aria-labelledby="tab-settings">
          <h3 class="panel-title">Settings</h3>
          <div class="toggle-row">
            <div class="toggle-info">
              <div class="toggle-label">Clear Events</div>
              <div class="toggle-sub">Runs <code>Insider.eventManager.clearAll()</code></div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="clear-events-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>

        <section class="panel" id="panel-preamble" role="tabpanel" aria-labelledby="tab-preamble">
          <h3 class="panel-title">JS Preamble</h3>
          <p class="preamble-desc">Prepended to every injected JS file.</p>
          <textarea id="preamble" spellcheck="false" placeholder="const myVar = window.someGlobal;"></textarea>
          <div class="save-row">
            <button id="save-preamble" class="btn primary" style="padding:4px 14px;">Save</button>
            <span id="save-status">Saved!</span>
          </div>
        </section>

      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
