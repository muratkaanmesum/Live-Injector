<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      /* ── font ───────────────────────────────────────────────────────── */
      @font-face {
        font-family: 'JetBrains Mono';
        src: url('fonts/JetBrainsMono[wght].woff2') format('woff2-variations');
        font-weight: 100 800;
        font-display: swap;
      }

      /* ── design tokens ──────────────────────────────────────────────── */
      :root {
        --font-ui:   ui-sans-serif, -apple-system, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 10px;
        --ease: cubic-bezier(0.2, 0, 0, 1);
        --dur: 160ms;

        --accent:      oklch(0.64 0.21 26);
        --accent-soft: oklch(0.64 0.21 26 / 0.14);
        --accent-halo: oklch(0.64 0.21 26 / 0.28);

        --accent-campaign: #e8a24a;
        --accent-rule:     #5ec4b6;

        /* dark theme by default */
        --bg:          oklch(0.17 0.005 60);
        --bg-sunk:     oklch(0.14 0.005 60);
        --surface:     oklch(0.21 0.005 60);
        --surface-hi:  oklch(0.24 0.005 60);
        --border:      oklch(0.29 0.005 60);
        --border-soft: oklch(0.23 0.005 60);
        --text:        oklch(0.96 0 0);
        --text-2:      oklch(0.78 0.004 60);
        --text-3:      oklch(0.56 0.006 60);
        --text-4:      oklch(0.40 0.006 60);

        --hairline:        rgba(255,255,255,0.08);
        --hairline-strong: rgba(255,255,255,0.14);
        --pending-border:  rgba(232,162,74,0.35);
      }

      @media (prefers-color-scheme: light) {
        html:not([data-theme="dark"]) {
          color-scheme: light;
          --bg:          oklch(0.985 0.002 85);
          --bg-sunk:     oklch(0.96  0.003 85);
          --surface:     oklch(1     0     0);
          --surface-hi:  oklch(0.97  0.003 85);
          --border:      oklch(0.88  0.004 85);
          --border-soft: oklch(0.93  0.003 85);
          --text:        oklch(0.22  0.01  60);
          --text-2:      oklch(0.38  0.008 60);
          --text-3:      oklch(0.55  0.006 60);
          --text-4:      oklch(0.72  0.004 60);
          --hairline:        rgba(0,0,0,0.07);
          --hairline-strong: rgba(0,0,0,0.12);
          --pending-border:  rgba(180,110,20,0.35);
        }
      }
      [data-theme="light"] {
        color-scheme: light;
        --bg:          oklch(0.985 0.002 85);
        --bg-sunk:     oklch(0.96  0.003 85);
        --surface:     oklch(1     0     0);
        --surface-hi:  oklch(0.97  0.003 85);
        --border:      oklch(0.88  0.004 85);
        --border-soft: oklch(0.93  0.003 85);
        --text:        oklch(0.22  0.01  60);
        --text-2:      oklch(0.38  0.008 60);
        --text-3:      oklch(0.55  0.006 60);
        --text-4:      oklch(0.72  0.004 60);
        --hairline:        rgba(0,0,0,0.07);
        --hairline-strong: rgba(0,0,0,0.12);
        --pending-border:  rgba(180,110,20,0.35);
      }
      [data-theme="dark"] { color-scheme: dark; }

      /* ── reset ──────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: var(--font-ui);
        font-size: 12.5px; line-height: 1.45;
        color: var(--text); background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
      .hidden { display: none !important; }

      /* ── app shell ──────────────────────────────────────────────────── */
      .app {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        height: 100vh; overflow: hidden;
      }

      /* ── titlebar ───────────────────────────────────────────────────── */
      .titlebar {
        display: flex; align-items: center; gap: 8px;
        padding: 9px 12px 8px;
        border-bottom: 1px solid var(--border-soft);
        flex-shrink: 0;
      }
      .brand-mark {
        width: 14px; height: 14px; flex-shrink: 0;
        border-radius: 4px;
        background: linear-gradient(135deg, var(--accent) 0%, oklch(0.52 0.2 35) 100%);
        box-shadow: 0 0 8px var(--accent-halo);
      }
      .brand-title { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; }
      .brand-sep   { color: var(--text-4); margin: 0 1px; font-size: 11px; }
      .brand-sub   { font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
      .titlebar-spacer { flex: 1; }
      .origin-chip {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 9px 3px 7px;
        background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
        font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
        max-width: 220px; overflow: hidden; white-space: nowrap;
        transition: border-color var(--dur) var(--ease);
      }
      .origin-dot {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        background: oklch(0.68 0.17 148); box-shadow: 0 0 5px oklch(0.68 0.17 148 / 0.6);
        transition: background var(--dur), box-shadow var(--dur);
      }
      .origin-chip.is-unknown .origin-dot { background: var(--text-4); box-shadow: none; }
      .origin-proto { color: var(--text-3); }
      .theme-toggle {
        width: 26px; height: 26px; border-radius: var(--radius-md);
        border: 1px solid var(--border); color: var(--text-3);
        display: inline-grid; place-items: center; flex-shrink: 0;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
      }
      .theme-toggle:hover { background: var(--surface); color: var(--text); }

      /* ── toolbar ────────────────────────────────────────────────────── */
      .toolbar {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 10px;
        background: var(--bg-sunk); border-bottom: 1px solid var(--border-soft);
        flex-shrink: 0;
      }
      .search-wrap { flex: 1; position: relative; min-width: 0; }
      .search-wrap svg {
        position: absolute; top: 50%; left: 7px;
        transform: translateY(-50%); color: var(--text-4); pointer-events: none;
      }
      .search-wrap input {
        width: 100%; height: 27px; padding: 0 8px 0 25px;
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
        font-family: var(--font-mono); font-size: 11.5px; color: var(--text);
        transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); outline: none;
      }
      .search-wrap input::placeholder { color: var(--text-4); }
      .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
      .segmented {
        display: inline-flex; background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-md); padding: 2px; flex-shrink: 0;
      }
      .segmented button {
        padding: 2px 9px; font-size: 11px; color: var(--text-3); border-radius: 4px;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease); white-space: nowrap;
      }
      .segmented button.is-active { background: var(--bg); color: var(--text); box-shadow: 0 1px 2px oklch(0 0 0 / 0.3); }
      .segmented button:hover:not(.is-active) { color: var(--text-2); }
      .toolbar-btn {
        width: 27px; height: 27px; border-radius: var(--radius-md);
        border: 1px solid var(--border); color: var(--text-3);
        display: inline-grid; place-items: center; flex-shrink: 0;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
      }
      .toolbar-btn:hover { background: var(--surface); color: var(--text); }
      .toolbar-btn.is-danger:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
      .toolbar-divider {
        width: 1px; height: 16px; background: var(--border); flex-shrink: 0; margin: 0 2px;
      }
      .toolbar-chip {
        height: 27px; padding: 0 9px; border-radius: var(--radius-md);
        border: 1px solid var(--border); color: var(--text-3);
        display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0;
        font-size: 11px; white-space: nowrap;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
      }
      .toolbar-chip:hover { background: var(--surface); color: var(--text); }
      .toolbar-chip.is-active {
        background: oklch(0.67 0.12 191 / 0.15);
        border-color: var(--accent-rule);
        color: var(--accent-rule);
      }
      .toolbar-chip.is-active:hover { background: oklch(0.67 0.12 191 / 0.22); }

      /* ── scroll area ────────────────────────────────────────────────── */
      .scroll { overflow-y: auto; padding: 8px 8px 32px; }
      .scroll::-webkit-scrollbar { width: 6px; }
      .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* ── empty / no-results ─────────────────────────────────────────── */
      #empty, #no-results {
        color: var(--text-3); padding: 28px 0; text-align: center; font-size: 12px;
      }

      /* ── group card ─────────────────────────────────────────────────── */
      .group {
        margin-bottom: 5px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
      }
      .group.has-breaks {
        border-color: oklch(0.64 0.21 26 / 0.5);
        box-shadow: inset 3px 0 0 var(--accent);
      }

      /* ── group header — outer click wrapper ─────────────────────────── */
      .group-header {
        cursor: pointer; user-select: none;
      }
      .group-row {
        display: grid;
        grid-template-columns: 14px 1fr auto auto auto;
        align-items: center;
        gap: 8px;
        padding: 7px 10px 6px;
        transition: background var(--dur) var(--ease);
      }
      .group-header:hover .group-row { background: var(--surface-hi); }
      .group-meta {
        padding: 2px 10px 6px 34px;
        border-top: 1px solid var(--hairline);
        font-family: var(--font-mono); font-size: 9.5px;
        font-weight: 500; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--text-4);
        font-variant-numeric: tabular-nums;
      }

      .caret {
        color: var(--text-4); display: flex; align-items: center; flex-shrink: 0;
        transition: transform var(--dur) var(--ease), color var(--dur) var(--ease);
      }
      .group.is-open .caret { transform: rotate(90deg); color: var(--text-3); }
      .group-name {
        font-family: var(--font-mono); font-weight: 500; font-size: 12px;
        color: var(--text); overflow: hidden; white-space: nowrap;
        display: flex; align-items: center; gap: 8px; min-width: 0;
      }
      .group-name-id { flex-shrink: 0; }
      .group-name-sep { color: var(--text-4); flex-shrink: 0; }
      .group-variation-id {
        font-size: 12px; font-weight: 500;
        color: var(--text); font-variant-numeric: tabular-nums;
        flex-shrink: 0; white-space: nowrap;
      }
      .break-badge {
        display: inline-flex; align-items: center; gap: 3px;
        padding: 1px 7px 1px 5px;
        background: var(--accent-soft); color: var(--accent);
        border-radius: 999px; font-family: var(--font-mono);
        font-size: 10.5px; font-weight: 600; flex-shrink: 0;
      }
      .break-badge::before {
        content: ''; width: 5px; height: 5px; border-radius: 50%;
        background: var(--accent); box-shadow: 0 0 5px var(--accent-halo);
      }
      .group-hit-count {
        font-family: var(--font-mono); font-size: 11.5px; color: var(--text-3);
        font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; flex-shrink: 0;
      }
      .bulk-break {
        width: 20px; height: 20px; border-radius: 4px; color: var(--text-4);
        display: inline-grid; place-items: center; flex-shrink: 0;
        border: 1px dashed transparent;
        transition: all var(--dur) var(--ease);
      }
      .group-header:hover .bulk-break { border-color: var(--border); color: var(--text-3); }
      .bulk-break:hover { background: var(--accent-soft) !important; color: var(--accent) !important; border-color: var(--accent) !important; border-style: solid !important; }

      /* ── pending group ──────────────────────────────────────────────── */
      .group.is-pending {
        border: 1px dashed var(--pending-border);
        background: transparent;
        box-shadow: none;
      }
      .group.is-pending .group-header:hover .group-row { background: transparent; }
      .group.is-pending .group-name {
        font-style: italic; letter-spacing: 0.04em; color: var(--text-3);
        animation: pending-breathe 2.4s ease-in-out infinite;
      }
      @keyframes pending-breathe {
        0%, 100% { opacity: 0.55; }
        50%       { opacity: 0.9;  }
      }
      @media (prefers-reduced-motion: reduce) {
        .group.is-pending .group-name { animation: none; opacity: 0.7; }
      }

      /* ── testing glow ───────────────────────────────────────────────── */
      .group.is-testing {
        border-color: oklch(0.78 0.11 180 / 0.55);
        box-shadow:
          0 0 0 1px oklch(0.78 0.11 180 / 0.35) inset,
          0 0 18px -2px oklch(0.78 0.11 180 / 0.45);
      }
      .group.is-testing .group-variation-id {
        color: var(--accent-rule);
      }
      .group.is-testing .testing-pill {
        display: inline-flex;
      }
      .testing-pill {
        display: none;
        align-items: center;
        gap: 4px;
        margin-left: 8px;
        padding: 1px 6px;
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-rule);
        background: oklch(0.78 0.11 180 / 0.12);
        border: 1px solid oklch(0.78 0.11 180 / 0.35);
        border-radius: 999px;
        vertical-align: middle;
      }
      .testing-pill::before {
        content: "";
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent-rule);
        box-shadow: 0 0 6px var(--accent-rule);
      }

      /* ── group body with animated collapse ─────────────────────────── */
      .group-body-wrap {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 220ms var(--ease);
      }
      .group.is-open .group-body-wrap { grid-template-rows: 1fr; }
      .group-body { min-height: 0; overflow: hidden; border-top: 1px solid var(--hairline-strong); }

      /* ── instance row ───────────────────────────────────────────────── */
      .instance {
        display: grid;
        grid-template-columns: 8px 74px 44px 36px 26px;
        align-items: center; gap: 8px;
        padding: 6px 10px 6px 26px;
        border-bottom: 1px solid var(--border-soft);
        transition: background var(--dur) var(--ease);
      }
      .instance:last-child { border-bottom: 0; }
      .instance:hover { background: var(--surface-hi); }
      .instance:focus { outline: none; background: var(--surface-hi); box-shadow: inset 2px 0 0 var(--accent); }
      .instance-dot {
        width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
        background: var(--text-4);
        transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
      }
      .instance.is-breaking .instance-dot { background: var(--accent); box-shadow: 0 0 5px var(--accent-halo); }

      /* ── type badge ─────────────────────────────────────────────────── */
      .row-badge {
        position: relative;
        display: inline-flex; align-items: center;
        height: 18px; padding: 0 7px 0 11px;
        border-radius: 2px;
        font-family: var(--font-mono);
        font-size: 9px; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase;
        overflow: hidden; white-space: nowrap;
        width: 74px; flex-shrink: 0; box-sizing: border-box;
      }
      .row-badge::before {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px;
      }
      .row-badge.type-campaign {
        color: var(--accent-campaign);
        background: rgba(232,162,74,0.08);
      }
      .row-badge.type-campaign::before { background: var(--accent-campaign); }
      .row-badge.type-rule {
        color: var(--accent-rule);
        background: rgba(94,196,182,0.08);
      }
      .row-badge.type-rule::before { background: var(--accent-rule); }

      .instance-hit-count {
        font-family: var(--font-mono); font-size: 11.5px; color: var(--text-3);
        font-variant-numeric: tabular-nums; text-align: right;
        transition: color var(--dur) var(--ease);
      }
      @keyframes count-pulse {
        0%   { color: oklch(0.83 0.15 72); }
        100% { color: var(--text-3); }
      }
      .instance-hit-count.pulse { animation: count-pulse 600ms ease-out; }

      /* ── sparkline ──────────────────────────────────────────────────── */
      .sparkline {
        display: flex; align-items: flex-end; gap: 1.5px;
        height: 14px;
      }
      .sparkline span {
        flex: 1; min-height: 2px; border-radius: 1px;
        background: var(--text-4); opacity: 0.7;
        transition: height 180ms var(--ease);
      }
      .instance:hover .sparkline span { background: var(--text-3); }
      .instance.is-breaking .sparkline span { background: oklch(0.64 0.21 26 / 0.45); opacity: 1; }

      /* ── breakpoint checkbox ────────────────────────────────────────── */
      .bp {
        -webkit-appearance: none; appearance: none;
        width: 13px; height: 13px; border-radius: 50%;
        border: 1.5px solid var(--text-4); cursor: pointer;
        position: relative; flex-shrink: 0;
        transition: border-color var(--dur) var(--ease),
                    background    var(--dur) var(--ease),
                    box-shadow    var(--dur) var(--ease);
        justify-self: end;
      }
      .bp:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
      .bp:checked {
        background: var(--accent); border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft), 0 0 7px var(--accent-halo);
      }
      .bp:checked::after {
        content: ''; position: absolute; inset: 0; margin: auto;
        width: 4px; height: 4px; border-radius: 50%; background: oklch(1 0 0 / 0.75);
      }
      .bp:disabled { opacity: 0.35; cursor: not-allowed; }

      /* ── row migration animations ───────────────────────────────────── */
      @keyframes row-exit {
        to { opacity: 0; transform: translateX(-4px); }
      }
      @keyframes row-enter {
        from { opacity: 0; transform: translateX(4px); }
      }

      /* ── badge pulse (one-shot after migration) ─────────────────────── */
      @keyframes badge-pulse {
        0%   { outline: 2px solid var(--pending-border); outline-offset: 1px; }
        100% { outline: 2px solid transparent;           outline-offset: 3px; }
      }
      .row-badge.just-arrived {
        animation: badge-pulse 280ms ease-out forwards;
      }
      @media (prefers-reduced-motion: reduce) {
        .row-badge.just-arrived { animation: none; }
      }

      /* ── status bar ─────────────────────────────────────────────────── */
      .statusbar {
        display: flex; align-items: center; gap: 10px;
        padding: 5px 12px;
        background: var(--bg-sunk); border-top: 1px solid var(--border-soft);
        font-size: 10.5px; font-family: var(--font-mono); color: var(--text-3);
        flex-shrink: 0; white-space: nowrap; overflow: hidden;
      }
      .statusbar-live { display: inline-flex; align-items: center; gap: 6px; }
      .statusbar-live::before {
        content: ''; width: 5px; height: 5px; border-radius: 50%;
        background: oklch(0.68 0.17 148);
        animation: live-pulse 1.8s ease-in-out infinite;
      }
      @keyframes live-pulse {
        0%, 100% { opacity: 0.3; }
        50%  { opacity: 1; box-shadow: 0 0 5px oklch(0.68 0.17 148 / 0.7); }
      }
      .statusbar-sep { color: var(--text-4); }
      .statusbar-spacer { flex: 1; min-width: 0; }
      .statusbar-hints { color: var(--text-4); overflow: hidden; text-overflow: ellipsis; }
      .statusbar-hints kbd {
        font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
        background: var(--surface); padding: 0 4px;
        border: 1px solid var(--border); border-radius: 3px;
      }
      #status-breaks { transition: color var(--dur) var(--ease); }
      #status-breaks.is-active { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="titlebar">
        <span class="brand-mark"></span>
        <span class="brand-title">Interceptor</span>
        <span class="brand-sep">/</span>
        <span class="brand-sub">Tags</span>
        <div class="titlebar-spacer"></div>
        <span class="origin-chip is-unknown" id="origin-chip">
          <span class="origin-dot"></span>
          <span class="origin-proto" id="origin-proto"></span><span id="origin">—</span>
        </span>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="search-input" placeholder="Filter by tag or campaign…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="segmented" id="filter-seg">
          <button data-filter="all" class="is-active">All</button>
          <button data-filter="breaking">Breaking</button>
          <button data-filter="hot">Hot</button>
        </div>
        <div class="toolbar-divider" aria-hidden="true"></div>
        <button class="toolbar-chip is-active" id="eval-intercept-toggle" title="Toggle eval() interceptor" aria-pressed="true">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          Eval
        </button>
        <button class="toolbar-chip is-active" id="script-intercept-toggle" title="Toggle &lt;script&gt; tag interceptor" aria-pressed="true">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
          Script
        </button>
        <button class="toolbar-btn" id="collapse-all-btn" title="Collapse / expand all">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 8 12 3 7 8"/><polyline points="17 16 12 21 7 16"/>
          </svg>
        </button>
        <button class="toolbar-btn is-danger" id="clear-breaks-btn" title="Clear all breakpoints">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>

      <div class="scroll">
        <div id="empty">No classified tags yet. Reload the page to capture.</div>
        <div id="no-results" class="hidden">No tags match the current filter.</div>
        <div id="rows"></div>
      </div>

      <div class="statusbar">
        <span class="statusbar-live">Listening</span>
        <span class="statusbar-sep">·</span>
        <span id="status-rules">0 rules</span>
        <span class="statusbar-sep">·</span>
        <span id="status-hits">0 hits</span>
        <span class="statusbar-sep">·</span>
        <span id="status-breaks">0 breaks</span>
        <span class="statusbar-spacer"></span>
        <span class="statusbar-hints">
          <kbd>⌘F</kbd> filter &nbsp;<span class="statusbar-sep">·</span>&nbsp;
          <kbd>Space</kbd> break &nbsp;<span class="statusbar-sep">·</span>&nbsp;
          <kbd>⌘K</kbd> clear
        </span>
      </div>
    </div>

    <script>
      (function () {
        var root = document.documentElement;
        var stored = localStorage.getItem('li-theme');
        if (stored === 'light' || stored === 'dark') root.dataset.theme = stored;
        document.getElementById('theme-toggle').addEventListener('click', function () {
          var next = root.dataset.theme === 'light' ? 'dark' : 'light';
          root.dataset.theme = next;
          localStorage.setItem('li-theme', next);
        });
      })();
    </script>
    <script src="panel.js"></script>
  </body>
</html>
