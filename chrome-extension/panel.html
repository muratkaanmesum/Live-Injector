<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        margin: 0;
        padding: 12px;
        color: #222;
        background: #fff;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      h1 { font-size: 13px; margin: 0; font-weight: 600; }
      #origin { font-size: 11px; color: #888; font-family: monospace; }
      #empty {
        color: #888;
        padding: 20px 0;
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: monospace;
      }
      th, td {
        text-align: left;
        padding: 4px 8px;
        border-bottom: 1px solid #eee;
      }
      th {
        font-weight: 600;
        color: #555;
        background: #fafafa;
      }
      td.count { text-align: right; width: 60px; color: #555; }
      td.toggle { width: 60px; text-align: center; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>Live Injector — Classified Tags</h1>
      <span id="origin">—</span>
    </header>
    <div id="empty">No classified tags yet. Reload the page to capture.</div>
    <table id="tags" class="hidden">
      <thead>
        <tr><th>Tag</th><th class="count">Count</th><th class="toggle">Break</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <script src="panel.js"></script>
  </body>
</html>
